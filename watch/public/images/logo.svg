<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Clock face -->
  <circle cx="32" cy="32" r="28" stroke="#6366f1" stroke-width="4" fill="white"/>
  <!-- Hour markers -->
  <circle cx="32" cy="8" r="2" fill="#6366f1"/>
  <circle cx="56" cy="32" r="2" fill="#6366f1"/>
  <circle cx="32" cy="56" r="2" fill="#6366f1"/>
  <circle cx="8" cy="32" r="2" fill="#6366f1"/>
  <!-- Minute hand at :55 (pointing to 11 o'clock position) -->
  <line x1="32" y1="32" x2="21" y2="12" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="3" fill="#6366f1"/>
</svg>
